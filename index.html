<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">ปิดปรับปรุงเซิร์ฟเวอร์</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #dbeafe 0%, #f0f9ff 50%, #e0f2fe 100%);
      font-family: 'Kanit', 'Segoe UI', 'Noto Sans Thai', sans-serif;
      color: #1e3a5f;
    }

    /* ── Language toggle ── */
    .lang-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      background: #fff;
      border: 2px solid #3b9fd8;
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(59, 159, 216, 0.25);
      z-index: 100;
    }

    .lang-btn {
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #3b9fd8;
      transition: background 0.2s, color 0.2s;
      font-family: inherit;
    }

    .lang-btn.active {
      background: #3b9fd8;
      color: #fff;
    }

    .lang-btn:not(.active):hover {
      background: #e0f2fe;
    }

    /* ── Card ── */
    .container {
      text-align: center;
      padding: 2.5rem 2rem 2rem;
      max-width: 500px;
      width: calc(100% - 2rem);
      background: #ffffff;
      border-radius: 1.75rem;
      box-shadow: 0 8px 40px rgba(59, 159, 216, 0.18);
      border: 2px solid #bae0f7;
    }

    /* ── Mascot ── */
    .mascot-wrapper {
      margin-bottom: 1.25rem;
    }

    .mascot-wrapper svg {
      width: 130px;
      height: 130px;
      filter: drop-shadow(0 6px 16px rgba(59, 159, 216, 0.35));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    /* ── Typography ── */
    h1 {
      font-size: 1.85rem;
      font-weight: 800;
      color: #1565c0;
      margin-bottom: 0.6rem;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 1rem;
      color: #4a7fa5;
      line-height: 1.75;
    }

    /* ── Time badge ── */
    .time-badge {
      display: inline-block;
      margin-top: 1.5rem;
      background: #e0f2fe;
      border: 1.5px solid #7ec8ee;
      border-radius: 1rem;
      padding: 0.8rem 1.4rem;
      font-size: 0.9rem;
      color: #1e4d78;
      line-height: 2;
    }

    .time-badge strong {
      color: #1565c0;
      font-weight: 700;
    }

    /* ── Done banner ── */
    .done-msg {
      display: none;
      margin-top: 1.5rem;
      padding: 0.8rem 1.4rem;
      background: #e0f7fa;
      border: 1.5px solid #4dd0e1;
      border-radius: 1rem;
      font-size: 0.9rem;
      color: #005f73;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Language Toggle -->
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-th" onclick="setLang('th')">ไทย</button>
    <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="container">
    <h1 id="main-title">ปิดปรับปรุงเซิร์ฟเวอร์</h1>
    <p class="subtitle" id="main-subtitle">ขออภัยในความไม่สะดวก<br>ระบบอยู่ระหว่างการปรับปรุง กรุณากลับมาใหม่ภายหลัง</p>

    <div class="time-badge" id="time-badge">
      วันที่ <strong>10 มีนาคม 2569</strong> เวลา <strong>20:30 น.</strong><br>
      ถึง <strong>11 มีนาคม 2569</strong> เวลา <strong>09:30 น.</strong><br>
      (เวลาประเทศไทย, UTC+7)
    </div>
  </div>

  <script>
    var i18n = {
      th: {
        pageTitle: 'ปิดปรับปรุงเซิร์ฟเวอร์',
        mainTitle: 'ปิดปรับปรุงเซิร์ฟเวอร์',
        mainSub:   'ขออภัยในความไม่สะดวก<br>ระบบอยู่ระหว่างการปรับปรุง กรุณากลับมาใหม่ภายหลัง',
        timeBadge: 'วันที่ <strong>10 มีนาคม 2569</strong> เวลา <strong>20:30 น.</strong><br>ถึง <strong>11 มีนาคม 2569</strong> เวลา <strong>09:30 น.</strong><br>(เวลาประเทศไทย, UTC+7)',
        doneText:  'การปรับปรุงเสร็จสิ้นแล้ว ระบบกลับมาให้บริการปกติ'
      },
      en: {
        pageTitle: 'Server Maintenance',
        mainTitle: 'Server Maintenance',
        mainSub:   'We apologize for the inconvenience.<br>The system is under maintenance. Please check back later.',
        timeBadge: 'From <strong>March 10, 2026</strong> at <strong>8:30 PM</strong><br>to <strong>March 11, 2026</strong> at <strong>9:30 AM</strong><br>(Thailand Time, UTC+7)',
        doneText:  'Maintenance complete. The system is back online.'
      }
    };

    function setLang(lang) {
      var t = i18n[lang];
      document.documentElement.lang = lang;
      document.getElementById('page-title').textContent  = t.pageTitle;
      document.getElementById('main-title').textContent  = t.mainTitle;
      document.getElementById('main-subtitle').innerHTML = t.mainSub;
      document.getElementById('time-badge').innerHTML    = t.timeBadge;
      document.getElementById('done-text').textContent   = t.doneText;
      document.getElementById('btn-th').classList.toggle('active', lang === 'th');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }
  </script>
</body>
</html>
